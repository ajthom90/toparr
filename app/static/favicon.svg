<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2332"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="chip" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Chip body -->
  <rect x="136" y="136" width="240" height="240" rx="24" fill="none" stroke="url(#chip)" stroke-width="12"/>

  <!-- Chip pins - top -->
  <rect x="192" y="100" width="16" height="48" rx="4" fill="#2dd4bf" opacity="0.7"/>
  <rect x="248" y="100" width="16" height="48" rx="4" fill="#2dd4bf" opacity="0.7"/>
  <rect x="304" y="100" width="16" height="48" rx="4" fill="#2dd4bf" opacity="0.7"/>

  <!-- Chip pins - bottom -->
  <rect x="192" y="364" width="16" height="48" rx="4" fill="#2dd4bf" opacity="0.7"/>
  <rect x="248" y="364" width="16" height="48" rx="4" fill="#2dd4bf" opacity="0.7"/>
  <rect x="304" y="364" width="16" height="48" rx="4" fill="#2dd4bf" opacity="0.7"/>

  <!-- Chip pins - left -->
  <rect x="100" y="192" width="48" height="16" rx="4" fill="#2dd4bf" opacity="0.7"/>
  <rect x="100" y="248" width="48" height="16" rx="4" fill="#2dd4bf" opacity="0.7"/>
  <rect x="100" y="304" width="48" height="16" rx="4" fill="#2dd4bf" opacity="0.7"/>

  <!-- Chip pins - right -->
  <rect x="364" y="192" width="48" height="16" rx="4" fill="#2dd4bf" opacity="0.7"/>
  <rect x="364" y="248" width="48" height="16" rx="4" fill="#2dd4bf" opacity="0.7"/>
  <rect x="364" y="304" width="48" height="16" rx="4" fill="#2dd4bf" opacity="0.7"/>

  <!-- Bar chart inside chip -->
  <rect x="188" y="268" width="32" height="80" rx="4" fill="url(#bar1)" opacity="0.9"/>
  <rect x="240" y="218" width="32" height="130" rx="4" fill="url(#bar2)" opacity="0.9"/>
  <rect x="292" y="188" width="32" height="160" rx="4" fill="url(#bar1)" opacity="0.9"/>

  <!-- Sparkline inside chip -->
  <polyline
    points="180,210 205,200 230,215 256,195 280,205 305,180 330,190"
    fill="none"
    stroke="#fbbf24"
    stroke-width="6"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.9"
  />
</svg>
